<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="./Expense-tracker.css">
</head>
<body>

<div class="container">
    <h1>💰 Expense Tracker</h1>

    <div class="balance">
        Balance: ₹<span id="balance">0</span>
    </div>

    <div class="summary">
        <div>
            <p>Income</p>
            <p class="income">₹<span id="income">0</span></p>
        </div>
        <div>
            <p>Expense</p>
            <p class="expense-text">₹<span id="expense">0</span></p>
        </div>
    </div>

    <div class="form">
        <input type="text" id="text" placeholder="Enter description (e.g. Salary)">
        <input type="number" id="amount" placeholder="Amount (+income / -expense)">
        <button onclick="addTransaction()">Add Transaction</button>
    </div>

    <ul id="list"></ul>
</div>
<script src="./Expense-tracker.js"></script>
</body>
</html>
